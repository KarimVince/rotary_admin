# Test running is disabled for now — see doc/CLAUDE.md ("Workflow when
# implementing a story"). Test suites are run manually at the end of each
# epic's dedicated test & fix story instead of automatically per push/PR.
# Trigger this workflow manually (Actions tab -> Run workflow) if needed.
name: CI

on:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rotary_admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/rotary_admin
      JWT_SECRET: ci-test-secret

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv venv
          venv/bin/pip install --upgrade pip
          venv/bin/pip install -r requirements.txt

      - name: Apply migrations to dev database
        run: venv/bin/alembic upgrade head

      - name: Run backend test suite (with coverage)
        run: venv/bin/pytest

      - name: Job summary
        if: always()
        run: |
          echo "Backend tests + coverage threshold - see logs above for pass/fail and coverage %." >> "$GITHUB_STEP_SUMMARY"

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend test suite
        run: npm run test

      - name: Job summary
        if: always()
        run: |
          echo "Frontend (Vitest) suite - see logs above for pass/fail." >> "$GITHUB_STEP_SUMMARY"
